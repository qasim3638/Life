name: Regression Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  code-integrity-tests:
    name: Code Integrity Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run code integrity tests
        run: |
          cd backend/tests
          python -m pytest test_code_integrity.py -v --tb=short

  backend-api-tests:
    name: Backend API Regression
    runs-on: ubuntu-latest
    needs: code-integrity-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Run API regression tests
        env:
          REACT_APP_BACKEND_URL: https://tile-station-production.up.railway.app
        run: |
          cd backend/tests
          python -m pytest test_comprehensive_regression.py -v --tb=short --junitxml=../../test_reports/regression_results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-test-results
          path: test_reports/regression_results.xml
