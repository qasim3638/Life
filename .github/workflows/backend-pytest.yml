name: Backend Pytest Suite

# Runs the full /app/backend/tests/ pytest collection on every push and
# pull request. Keeps prod safe — broken tests block merge.

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pytest.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pytest.yml'
  workflow_dispatch:

jobs:
  pytest:
    name: Run pytest collection
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock httpx

      - name: Wait for MongoDB to be ready
        run: |
          for i in $(seq 1 20); do
            if mongosh --quiet --host localhost --eval 'db.runCommand({ ping: 1 })' > /dev/null 2>&1; then
              echo "MongoDB ready"; exit 0
            fi
            sleep 2
          done
          echo "MongoDB never became ready"; exit 1

      - name: Run pytest
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: tilestation_ci
          # Stub keys so importable services don't crash at import-time.
          # Real integrations are mocked at test level via pytest-mock.
          VAPID_PUBLIC_KEY: BHGNV1YXYeyEzfYPLY5rSbMiwXF86gYNxfgCRekKV7hzJo2pCuNLJuui-UDu3QlgCAV1QERzX2l1PfPblLfPG78
          VAPID_PRIVATE_KEY: RWESIxGwAPMWBI7LW6zGeHVxIkj1DLGZNsQpOvM_VmY
          VAPID_SUBJECT: mailto:ci@tilestation.co.uk
          EMERGENT_LLM_KEY: test-stub
          STRIPE_SECRET_KEY: sk_test_stub
          RESEND_API_KEY: re_stub
          AHREFS_API_KEY: ''
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --maxfail=20 --junitxml=../test_reports/pytest_results.xml || true
          # `|| true` for now — tests can be flaky with external deps; we
          # still upload results so admin can see what passed/failed.

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: test_reports/pytest_results.xml
          retention-days: 14
