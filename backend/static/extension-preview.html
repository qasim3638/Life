<!DOCTYPE html>
<html>
<head>
  <title>Extension Previews</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      padding: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }
    .extension-wrapper {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .extension-wrapper h2 {
      color: white;
      text-align: center;
      margin-bottom: 15px;
      font-size: 16px;
    }
    iframe {
      border: none;
      border-radius: 8px;
      width: 340px;
      height: 650px;
      background: #f8f9fa;
    }
  </style>
</head>
<body>
  <div class="extension-wrapper">
    <h2>Verona Extension</h2>
    <iframe src="/extensions/verona/popup.html"></iframe>
  </div>
  <div class="extension-wrapper">
    <h2>Wallcano Extension</h2>
    <iframe src="/extensions/wallcano/popup.html"></iframe>
  </div>
  <div class="extension-wrapper">
    <h2>Splendour Extension</h2>
    <iframe src="/extensions/splendour/popup.html"></iframe>
  </div>
  <div class="extension-wrapper">
    <h2>Ceramica Impex Extension</h2>
    <iframe src="/extensions/ceramica/popup.html"></iframe>
  </div>
</body>
</html>
