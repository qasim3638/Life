[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt"
]

[phases.build]
cmds = ["echo 'no build step'"]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn server:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHON_VERSION = "3.11"
