<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 600px; overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .banner { position: relative; width: 1920px; height: 600px; overflow: hidden; }
  .banner img { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.92) 35%, rgba(0,0,0,0.5) 60%, transparent 80%); }
  .content { position: absolute; inset: 0; display: flex; align-items: center; padding-left: 100px; font-family: 'Inter', sans-serif; font-style: normal; }
  .badge { display: inline-block; background: #DC2626; color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 4px; padding: 14px 28px; border-radius: 6px; margin-bottom: 24px; }
  .title { font-size: 140px; font-weight: 900; color: #fff; line-height: 0.88; letter-spacing: -3px; margin-bottom: 14px; }
  .discount { font-size: 50px; font-weight: 900; color: #FF2020; margin-bottom: 20px; letter-spacing: -0.5px; }
  .subtitle { font-size: 28px; color: #fff; font-weight: 800; margin-bottom: 36px; max-width: 600px; line-height: 1.3; }
  .cta { display: inline-block; background: #DC2626; color: #fff; font-size: 24px; font-weight: 900; padding: 22px 60px; border-radius: 10px; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="banner">
  <img src="https://images.unsplash.com/photo-1663811396612-b94cac5b0e33?w=1920&q=95" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div>
      <div class="badge">LIMITED TIME ONLY</div>
      <div class="title">BIG SALE ON</div>
      <div class="discount">UP TO 70% OFF</div>
      <div class="subtitle">In stores & online — selected tiles, flooring, materials & more at incredible prices</div>
      <div class="cta">Shop Sale Now</div>
    </div>
  </div>
</div>
</body>
</html>
